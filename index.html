<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebOS</title>
<link rel="stylesheet" href="os.css">
</head>
<body>
<div id="desktop">
  <div id="desktop-icons"></div>
  <div id="windows-container"></div>
  <div id="context-menu"></div>
</div>
<div id="taskbar">
  <button id="start-btn">&#9776; Start</button>
  <div id="taskbar-items"></div>
  <div id="clock"></div>
</div>
<div id="start-menu" class="hidden">
  <div id="start-menu-content"></div>
</div>
<div id="splash">
  <div>WebOS</div>
  <div class="sub">A browser OS where you code your own software</div>
  <div class="spinner"></div>
</div>
<script src="weblang.js"></script>
<script src="apps.js"></script>
<script src="os.js"></script>
</body>
</html>
